<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Glow Routine</title>

<style>

body {
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
background: linear-gradient(135deg,#fde2e4,#e0f2fe);
padding:20px;
}

.container {
max-width:420px;
margin:auto;
}

/* HEADER */
.header {
background: rgba(255,255,255,0.6);
backdrop-filter: blur(20px);
padding:20px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 {
margin:0;
font-size:26px;
}

/* CONTROLS */
.controls {
margin-top:15px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

select, button {
padding:10px;
border-radius:14px;
border:none;
background:white;
}

/* ROUTINE CARD */
.card {
margin-top:20px;
padding:18px;
border-radius:22px;
background: rgba(255,255,255,0.7);
backdrop-filter: blur(15px);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* ITEM */
.item {
padding:12px;
margin:6px 0;
border-radius:14px;
background:white;
cursor:pointer;
transition:0.2s;
}

.item:active {
transform:scale(0.96);
}

.done {
opacity:0.5;
text-decoration:line-through;
}

/* HISTORY */
.history {
margin-top:20px;
}

.history-card {
background:white;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

/* PRODUCTS */
.products {
margin-top:20px;
}

.product {
background:white;
padding:10px;
border-radius:12px;
margin:5px 0;
}

.red {
background:#ff4d6d;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>✨ Glow Routine</h1>

<div class="controls">
<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Start</button>
</div>
</div>

<div id="routine"></div>

<div class="history">
<h3>📊 Historikk</h3>
<button class="red" onclick="clearHistory()">Tøm</button>
<div id="history"></div>
</div>

<div class="products">
<h3>🧴 Produkter</h3>
<div id="products"></div>
</div>

</div>

<script>

// DATA
let products = [
"Koreansk oljerens",
"Mild vannrens",
"BOJ Ginseng",
"Byoma Serum",
"Round Lab Cream",
"Tree Hut Scrub",
"ExfoliKate",
"Sol de Janeiro Body Butter",
"Kérastase Oil",
"Vitamin C"
];

let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// KEY
function key(){
return week.value+"-"+day.value+"-"+time.value;
}

// BARBER
function shave(d){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikini + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikini + intim",
"Søndag":"Armhuler + legger"
}[d];
}

// HAIR
function hair(w,d){
return (w==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(d)) ||
(w==2 && ["Tirsdag","Torsdag","Lørdag"].includes(d));
}

// SMART
function peelYesterday(){
let keys = Object.keys(tracker);
if(keys.length===0) return false;
return tracker[keys[keys.length-1]].includes("ExfoliKate");
}

// GENERATE
function generate(){

let k = key();
if(!tracker[k]) tracker[k]=[];

let list=[];
let peel = peelYesterday();

// MORGEN
if(time.value==="Morgen"){
list=[products[0],products[1],products[2],
(!peel?products[9]:null),
products[3],products[4]].filter(Boolean);
}

// KVELD
if(time.value==="Kveld"){

list.push("🚿 Dusj");

if(day.value==="Torsdag"){
list.push(products[5]);
}else{
list.push(products[7]);
}

list.push("🪒 "+shave(day.value));

if(hair(week.value,day.value)){
list.push("💇‍♀️ Hårvask");
list.push(products[8]);
}

list.push(products[0],products[1]);

if(day.value==="Torsdag"){
list.push(products[6]);
}else{
list.push(!peel ? products[3] : "Recovery");
}

list.push(products[2],products[4]);
}

render(list,k);
renderHistory();
renderProducts();
}

// RENDER
function render(list,k){
let div=routine;
div.innerHTML=`<div class="card"></div>`;
let card=div.firstChild;

list.forEach(item=>{
let done=tracker[k].includes(item);

let el=document.createElement("div");
el.className="item "+(done?"done":"");
el.innerText=item;

el.onclick=()=>{
if(tracker[k].includes(item)){
tracker[k]=tracker[k].filter(i=>i!==item);
}else{
tracker[k].push(item);
}
localStorage.setItem("tracker",JSON.stringify(tracker));
generate();
};

card.appendChild(el);
});
}

// HISTORY
function renderHistory(){
history.innerHTML="";
for(let k in tracker){
let el=document.createElement("div");
el.className="history-card";
el.innerHTML="<b>"+k+"</b><br>"+tracker[k].join("<br>");
history.appendChild(el);
}
}

// CLEAR
function clearHistory(){
tracker={};
localStorage.removeItem("tracker");
renderHistory();
}

// PRODUCTS
function renderProducts(){
productsDiv.innerHTML="";
products.forEach(p=>{
let el=document.createElement("div");
el.className="product";
el.innerText=p;
productsDiv.appendChild(el);
});
}

// INIT
renderProducts();
renderHistory();

</script>

</body>
</html>
