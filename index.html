<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Beauty Routine App</title>

<style>

body {
font-family: -apple-system, BlinkMacSystemFont;
background: linear-gradient(to bottom, #fdf2f8, #f8fafc);
padding:20px;
margin:0;
}

.container {
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1 {
font-size:28px;
margin-bottom:10px;
}

select, button {
padding:10px;
border-radius:12px;
border:none;
margin:5px;
}

button {
background:black;
color:white;
font-weight:600;
}

.section {
margin-top:20px;
padding:15px;
border-radius:16px;
background:#fafafa;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.item {
padding:10px;
margin:6px 0;
border-radius:12px;
background:white;
cursor:pointer;
transition:0.2s;
}

.item:hover {
transform:scale(1.02);
}

.done {
text-decoration:line-through;
color:gray;
background:#f1f5f9;
}

.history-card {
margin-top:10px;
padding:10px;
background:#fff;
border-radius:12px;
}

.product {
padding:8px;
background:#fff;
border-radius:10px;
margin:5px 0;
}

.red {
background:#ef4444;
}

</style>

</head>

<body>

<div class="container">

<h1>💖 Beauty Routine</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<br>

<button onclick="generate()">✨ Vis rutine</button>

<div id="routine"></div>

<h2>📊 Historikk</h2>
<button class="red" onclick="clearHistory()">Tøm historikk</button>
<div id="history"></div>

<h2>🧴 Produkter</h2>
<div id="products"></div>

</div>

<script>

// DATA
let products = [
"Koreansk oljerens",
"Mild vannrens",
"BOJ Ginseng",
"Byoma Serum",
"Round Lab Cream",
"Tree Hut Scrub",
"ExfoliKate",
"Sol de Janeiro Body Butter",
"Kérastase Oil",
"Medik8 Vitamin C"
];

let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// KEY
function key(){
return document.getElementById("week").value + "-" +
document.getElementById("day").value + "-" +
document.getElementById("time").value;
}

// BARBERING
function shave(day){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[day];
}

// HÅR
function hair(w,d){
if(w==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(d)) return true;
if(w==2 && ["Tirsdag","Torsdag","Lørdag"].includes(d)) return true;
return false;
}

// SMART
function usedPeel(){
let keys = Object.keys(tracker);
if(keys.length===0) return false;
let last = keys[keys.length-1];
return tracker[last].includes("ExfoliKate");
}

// GENERATE
function generate(){

let w = document.getElementById("week").value;
let d = document.getElementById("day").value;
let t = document.getElementById("time").value;
let k = key();

if(!tracker[k]) tracker[k]=[];

let list = [];
let peel = usedPeel();

if(t==="Morgen"){
list = [
products[0],
products[1],
products[2],
(!peel ? products[9]:null),
products[3],
products[4]
].filter(Boolean);
}

if(t==="Kveld"){

list.push("🚿 Dusj");

if(d==="Torsdag"){
list.push(products[5]);
}else{
list.push(products[7]);
}

list.push("🪒 "+shave(d));

if(hair(w,d)){
list.push("💇‍♀️ Hårvask");
list.push(products[8]);
}

list.push(products[0],products[1]);

if(d==="Torsdag"){
list.push(products[6]);
}else{
list.push(!peel ? products[3] : "Recovery");
}

list.push(products[2],products[4]);
}

render(list,k);
renderHistory();
renderProducts();
}

// RENDER
function render(list,k){
let div = document.getElementById("routine");
div.innerHTML="";

list.forEach(item=>{
let done = tracker[k].includes(item);

let el = document.createElement("div");
el.className="item "+(done?"done":"");
el.innerText="✔ "+item;

el.onclick=()=>toggle(item);

div.appendChild(el);
});
}

// TOGGLE
function toggle(item){
let k = key();

if(tracker[k].includes(item)){
tracker[k]=tracker[k].filter(i=>i!==item);
}else{
tracker[k].push(item);
}

localStorage.setItem("tracker",JSON.stringify(tracker));
generate();
}

// HISTORY
function renderHistory(){
let div=document.getElementById("history");
div.innerHTML="";

for(let k in tracker){
let card=document.createElement("div");
card.className="history-card";
card.innerHTML="<b>"+k+"</b><br>"+tracker[k].join("<br>");
div.appendChild(card);
}
}

// CLEAR
function clearHistory(){
if(confirm("Slette historikk?")){
tracker={};
localStorage.removeItem("tracker");
renderHistory();
}
}

// PRODUCTS
function renderProducts(){
let div=document.getElementById("products");
div.innerHTML="";

products.forEach(p=>{
let el=document.createElement("div");
el.className="product";
el.innerText=p;
div.appendChild(el);
});
}

// INIT
renderProducts();
renderHistory();

</script>

</body>
</html>
