<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Rutine App V5</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:12px; }
.section { margin-top:15px; padding:12px; background:#fafafa; border-radius:10px; }
button { margin:5px; padding:8px; border:none; border-radius:8px; background:black; color:white; }
input { padding:8px; margin:5px; }
</style>

</head>

<body>

<div class="container">

<h1>✨ Rutine App V5</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<button onclick="generate()">Vis rutine</button>

<div id="routine"></div>

<h2>📦 Produkter</h2>
<ul id="productList"></ul>

<input id="name" placeholder="Produktnavn">
<input id="type" placeholder="Type (rens, toner...)">
<button onclick="addProduct()">Legg til</button>

</div>

<script>

// PRODUKTER MED TYPE (VIKTIG!)
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Koreansk oljerens", type:"cleanser"},
{name:"Mild vannrens", type:"cleanser"},
{name:"BOJ Ginseng", type:"toner"},
{name:"d’Alba Mist", type:"mist"},
{name:"Medik8 C", type:"vitc"},
{name:"Laneige Serum", type:"serum"},
{name:"Byoma Serum", type:"night"},
{name:"Round Lab Cream", type:"cream"},
{name:"Paula’s Choice", type:"daycream"},
{name:"Kérastase Oil", type:"hair"},
{name:"Tree Hut Scrub", type:"scrub"},
{name:"ExfoliKate", type:"peel"},
{name:"Body Butter", type:"body"}
];

// HENT PRODUKT ETTER TYPE
function get(type){
return products.filter(p=>p.type===type).map(p=>p.name);
}

// BARBERING
function shave(day){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[day];
}

// HÅRVASK
function hair(week, day){
if(week==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(day)) return true;
if(week==2 && ["Tirsdag","Torsdag","Lørdag"].includes(day)) return true;
return false;
}

// GENERATE
function generate(){

let week = document.getElementById("week").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

let html = "";

// MORGEN
if(time==="Morgen"){
html += `
<div class="section">
<h3>🌞 Morgen</h3>
${get("cleanser").join("<br>")}
<br>${get("toner")}
<br>${get("mist")}
<br>${get("vitc")}
<br>${get("serum")}
<br>${get("daycream")}
</div>
`;
}

// KVELD
if(time==="Kveld"){

html += `
<div class="section">
<h3>🚿 Dusj</h3>
• Dusj + kroppsvask<br>
${day==="Torsdag" ? "• "+get("scrub")+"<br>• Body oil" : "• "+get("body")}
</div>
`;

html += `
<div class="section">
<h3>🪒 Barbering</h3>
• ${shave(day)}
</div>
`;

if(hair(week, day)){
html += `
<div class="section">
<h3>💇‍♀️ Hår</h3>
• Hårvask<br>
• ${get("hair")}
</div>
`;
}

html += `
<div class="section">
<h3>🧼 Skincare</h3>
${get("cleanser").join("<br>")}
<br>${(day==="Torsdag" && week==1) ? get("peel") : ""}
<br>${get("toner")}
<br>${get("night")}
<br>${get("cream")}
</div>
`;
}

document.getElementById("routine").innerHTML = html;
}

// ADD
function addProduct(){
let name = document.getElementById("name").value;
let type = document.getElementById("type").value;

products.push({name, type});
localStorage.setItem("products", JSON.stringify(products));
render();
}

// RENDER
function render(){
let list = document.getElementById("productList");
list.innerHTML = "";

products.forEach((p,i)=>{
list.innerHTML += `<li>${p.name} (${p.type}) <button onclick="remove(${i})">X</button></li>`;
});
}

// REMOVE
function remove(i){
products.splice(i,1);
localStorage.setItem("products", JSON.stringify(products));
render();
}

render();

</script>

</body>
</html>
