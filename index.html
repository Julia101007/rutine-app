<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Rutine App</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:800px; margin:auto; background:white; padding:20px; border-radius:12px; }
button { margin:5px; padding:10px; border:none; border-radius:8px; background:black; color:white; }
select, input { padding:8px; margin:5px; }
.done { text-decoration: line-through; color: gray; }
.section { margin-top:15px; padding:10px; background:#fafafa; border-radius:10px; }
</style>

</head>

<body>

<div class="container">

<h1>✨ Rutine App</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<button onclick="generate()">Vis rutine</button>

<h2>📋 Rutine</h2>
<div id="routine"></div>

<button onclick="showTravel()">✈️ Ferieliste</button>

</div>

<script>

// PRODUKTER
let products = {
cleanser:"Koreansk oljerens",
water:"Mild vannrens",
toner:"BOJ Ginseng",
mist:"d’Alba",
vitc:"Medik8 C",
serum:"Laneige Serum",
nightserum:"Byoma Serum",
cream:"Round Lab Cream",
daycream:"Paula’s Choice",
oil:"Kerastase Oil",
body:"Delicia Body Butter",
scrub:"Tree Hut Scrub",
peel:"ExfoliKate"
};

// BARBERINGSPLAN
function getShave(day){
if(day==="Mandag") return "Armhuler + legger";
if(day==="Tirsdag") return "Lår + armer";
if(day==="Onsdag") return "Bikinilinje + intim";
if(day==="Torsdag") return "Lår + armer";
if(day==="Fredag") return "Armhuler + legger";
if(day==="Lørdag") return "Bikinilinje + intim";
if(day==="Søndag") return "Armhuler + legger";
}

// GENERATE
function generate(){

let week = document.getElementById("week").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

let html = "";

// MORGEN
if(time==="Morgen"){
html += `
<div class="section">
🌞 Morgen:
<br>Rens → ${products.cleanser}
<br>Rens → ${products.water}
<br>Toner → ${products.toner}
<br>Mist → ${products.mist}
<br>Vitamin C → ${products.vitc}
<br>Serum → ${products.serum}
<br>Krem → ${products.daycream}
</div>
`;
}

// KVELD
if(time==="Kveld"){

// DUSJ
html += `
<div class="section">
🚿 Dusj:
<br>• Dusj + kroppsvask
`;

if(day==="Torsdag"){
html += `<br>• Skrubb → ${products.scrub}`;
html += `<br>• Body oil`;
}else{
html += `<br>• Body cream → ${products.body}`;
}

html += `<br><br>🪒 Barbering: ${getShave(day)}
</div>
`;

// HÅR
if(week==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(day)){
html += `<div class="section">💇‍♀️ Hår: Hårvask + ${products.oil}</div>`;
}

if(week==2 && ["Tirsdag","Torsdag","Lørdag"].includes(day)){
html += `<div class="section">💇‍♀️ Hår: Hårvask + ${products.oil}</div>`;
}

// SKINCARE
html += `
<div class="section">
🧼 Skincare:
<br>Rens → ${products.cleanser}
<br>Rens → ${products.water}
`;

if(day==="Torsdag" && week==1){
html += `<br>Peel → ${products.peel}`;
}

html += `
<br>Toner → ${products.toner}
<br>Serum → ${products.nightserum}
<br>Krem → ${products.cream}
</div>
`;
}

document.getElementById("routine").innerHTML = html;
}

// TRAVEL
function showTravel(){
document.getElementById("routine").innerHTML = `
<div class="section">
✈️ Ta med:
<br>${products.cleanser}
<br>${products.toner}
<br>${products.vitc}
<br>${products.serum}
<br>${products.cream}
</div>
`;
}

</script>

</body>
</html>
