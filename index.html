<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Rutine App</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:800px; margin:auto; background:white; padding:20px; border-radius:12px; }
button { margin:5px; padding:10px; border:none; border-radius:8px; background:black; color:white; }
select, input { padding:8px; margin:5px; }
.done { text-decoration: line-through; color: gray; }
</style>

</head>

<body>

<div class="container">

<h1>✨ Rutine App</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<button onclick="generate()">Vis rutine</button>

<h2>📋 Rutine</h2>
<div id="routine"></div>

<button onclick="showTravel()">✈️ Ferieliste</button>

<h2>📦 Produkter</h2>
<ul id="products"></ul>

<input id="newProduct" placeholder="Legg til produkt">
<button onclick="addProduct()">+</button>

</div>

<script>

// PRODUKTER
let products = JSON.parse(localStorage.getItem("products")) || {
cleanser:"Koreansk oljerens",
water:"Mild vannrens",
toner:"BOJ Ginseng",
mist:"d’Alba",
vitc:"Medik8 C",
serum:"Laneige Serum",
nightserum:"Byoma Serum",
cream:"Round Lab Cream",
daycream:"Paula’s Choice",
oil:"Kerastase Oil",
body:"Delicia Body Butter",
scrub:"Tree Hut Scrub",
peel:"ExfoliKate"
};

// TRACKER
let checked = JSON.parse(localStorage.getItem("checked")) || {};

// GENERATE
function generate(){
let week = document.getElementById("week").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

let list = [];

// MORGEN
if(time==="Morgen"){
list = [
products.cleanser,
products.water,
products.toner,
products.mist,
products.vitc,
products.serum,
products.daycream
];
}

// KVELD
if(time==="Kveld"){

list.push("Dusj + barbering");

// SCRUB DAG
if(day==="Torsdag"){
list.push(products.scrub);
list.push("Body oil");
}else{
list.push(products.body);
}

// HÅRVASK
if(week==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(day)){
list.push("Hårvask + "+products.oil);
}

if(week==2 && ["Tirsdag","Torsdag","Lørdag"].includes(day)){
list.push("Hårvask + "+products.oil);
}

// RENS
list.push(products.cleanser);
list.push(products.water);

// PEEL
if(day==="Torsdag" && week==1){
list.push(products.peel);
}

// REST
list.push(products.toner);
list.push(products.nightserum);
list.push(products.cream);
}

render(list);
}

// RENDER
function render(list){
let div = document.getElementById("routine");
div.innerHTML="";

list.forEach(item=>{
let id = item;
let checkedState = checked[id] ? "checked" : "";

div.innerHTML += `
<div onclick="toggle('${id}')" class="${checkedState?'done':''}">
<input type="checkbox" ${checkedState}> ${item}
</div>
`;
});
}

// TOGGLE
function toggle(id){
checked[id] = !checked[id];
localStorage.setItem("checked", JSON.stringify(checked));
generate();
}

// PRODUKTER
function addProduct(){
let val = document.getElementById("newProduct").value;
products[val]=val;
saveProducts();
}

function saveProducts(){
localStorage.setItem("products", JSON.stringify(products));
renderProducts();
}

function renderProducts(){
let ul = document.getElementById("products");
ul.innerHTML="";
Object.values(products).forEach(p=>{
ul.innerHTML+=`<li>${p}</li>`;
});
}

renderProducts();

// TRAVEL LIST
function showTravel(){
let travel = [
products.cleanser,
products.toner,
products.vitc,
products.serum,
products.cream
];

render(travel);
}

</script>

</body>
</html>
