<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>AI Glow Routine</title>

<style>
body {
font-family:-apple-system,Arial;
background:#f6f6f6;
padding:20px;
}

.container {
max-width:450px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
}

.controls {
display:flex;
flex-wrap:wrap;
gap:8px;
}

select,button,input {
padding:10px;
border-radius:12px;
border:1px solid #ccc;
}

button {
background:black;
color:white;
}

.item {
padding:12px;
margin:6px 0;
background:#eee;
border-radius:12px;
cursor:pointer;
}

.done {
opacity:0.4;
text-decoration:line-through;
}

.card {
margin-top:20px;
padding:15px;
background:#fafafa;
border-radius:15px;
}

.product-row {
display:flex;
justify-content:space-between;
}
</style>

</head>

<body>

<div class="container">

<h2>✨ AI Glow Routine</h2>

<div class="controls">

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Vis rutine</button>

</div>

<div id="routine"></div>

<div class="card">
<h3>🧴 Produkter</h3>

<input id="name" placeholder="Skriv produkt...">
<button onclick="addProduct()">Legg til</button>

<div id="products"></div>
</div>

<div class="card">
<h3>📊 Historikk</h3>
<button onclick="clearHistory()">Tøm</button>
<div id="history"></div>
</div>

</div>

<script>

// ===== STORAGE =====
let products = [];
let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// ===== AI CALL =====
async function analyze(name){

let res = await fetch("http://localhost:3000/analyze",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({name})
});

return await res.json();
}

// ===== ADD PRODUCT =====
async function addProduct(){

let input = document.getElementById("name");
let name = input.value.trim();
if(!name) return;

let result = await analyze(name);

// 🔥 REPLACE SAME CATEGORY
products = products.filter(p=>{
if(result.category==="active") return true;
return p.category !== result.category;
});

products.push({
name,
type: result.type,
category: result.category
});

input.value="";

renderProducts();
generate();
}

// ===== GENERATE =====
function generate(){

let key = week.value+"-"+day.value+"-"+time.value;
if(!tracker[key]) tracker[key]=[];

let skinType = skin.value;

let list = [];

// MORGEN
if(time.value==="Morgen"){

list.push(...products.filter(p=>p.category==="cleanser").map(p=>p.name));
list.push(...products.filter(p=>p.category==="toner").map(p=>p.name));

if(skinType!=="Sensitiv"){
list.push(...products.filter(p=>p.category==="active").map(p=>p.name));
}

list.push(...products.filter(p=>p.category==="serum").map(p=>p.name));
list.push(...products.filter(p=>p.category==="faceCream").map(p=>p.name));
}

// KVELD
if(time.value==="Kveld"){

list.push("🚿 Dusj");
list.push("🪒 Barbering");

list.push(...products.filter(p=>p.category==="body").map(p=>p.name));

list.push(...products.filter(p=>p.category==="cleanser").map(p=>p.name));

if(skinType!=="Sensitiv"){
list.push(...products.filter(p=>p.category==="active").map(p=>p.name));
}

list.push(...products.filter(p=>p.category==="serum").map(p=>p.name));
list.push(...products.filter(p=>p.category==="faceCream").map(p=>p.name));
}

renderRoutine(list,key);
renderHistory();
}

// ===== RENDER =====
function renderRoutine(list,key){

let div = document.getElementById("routine");
div.innerHTML="";

list.forEach(item=>{

let done = tracker[key].includes(item);

let el = document.createElement("div");
el.className="item "+(done?"done":"");
el.innerText=item;

el.onclick=()=>{
if(done){
tracker[key]=tracker[key].filter(i=>i!==item);
}else{
tracker[key].push(item);
}

localStorage.setItem("tracker",JSON.stringify(tracker));
generate();
};

div.appendChild(el);
});
}

// ===== PRODUCTS =====
function renderProducts(){

let div=document.getElementById("products");
div.innerHTML="";

products.forEach((p,i)=>{
let row=document.createElement("div");
row.className="product-row";

row.innerHTML=`
<span>${p.name}</span>
<button onclick="removeProduct(${i})">❌</button>
`;

div.appendChild(row);
});
}

// ===== REMOVE =====
function removeProduct(i){
products.splice(i,1);
renderProducts();
generate();
}

// ===== HISTORY =====
function renderHistory(){

let div=document.getElementById("history");
div.innerHTML="";

Object.keys(tracker).forEach(k=>{
let el=document.createElement("div");
el.innerText=k+": "+tracker[k].join(", ");
div.appendChild(el);
});
}

// ===== CLEAR =====
function clearHistory(){
tracker={};
localStorage.removeItem("tracker");
renderHistory();
}

</script>

</body>
</html>
