<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Rutine App V9</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:12px; }
.section { margin-top:15px; padding:12px; background:#fafafa; border-radius:10px; }
.item { cursor:pointer; padding:6px; }
.done { text-decoration: line-through; color:gray; }
button { margin:5px; padding:8px; border:none; border-radius:8px; }
.black { background:black; color:white; }
.red { background:#e74c3c; color:white; }
</style>

</head>

<body>

<div class="container">

<h1>✨ Rutine App</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<br>

<button class="black" onclick="generate()">Vis rutine</button>

<div id="routine"></div>

<!-- HISTORIKK -->
<h2>📊 Historikk</h2>
<button class="red" onclick="clearHistory()">🧹 Tøm ALL historikk</button>
<div id="history"></div>

<!-- PRODUKTER -->
<h2>📦 Alle produkter</h2>
<div id="productSection"></div>

</div>

<script>

// PRODUKTER
let products = [
"Koreansk oljerens",
"Mild vannrens",
"BOJ Ginseng",
"Byoma Serum",
"Round Lab Cream",
"Tree Hut Scrub",
"ExfoliKate",
"Sol de Janeiro Body Butter",
"Kérastase Oil"
];

// TRACKER
let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// KEY
function getKey(){
let w = document.getElementById("week").value;
let d = document.getElementById("day").value;
let t = document.getElementById("time").value;
return w+"-"+d+"-"+t;
}

// BARBERING
function shave(day){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[day];
}

// HÅR
function hair(week, day){
if(week==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(day)) return true;
if(week==2 && ["Tirsdag","Torsdag","Lørdag"].includes(day)) return true;
return false;
}

// GENERATE
function generate(){

let week = document.getElementById("week").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

let key = getKey();
if(!tracker[key]) tracker[key] = [];

let list = [];

// MORGEN
if(time==="Morgen"){
list = [
products[0],
products[1],
products[2],
products[3],
products[4]
];
}

// KVELD
if(time==="Kveld"){

list.push("Dusj + kroppsvask");

if(day==="Torsdag"){
list.push(products[5]);
list.push("Body oil");
}else{
list.push(products[7]);
}

list.push("Barbering: "+shave(day));

if(hair(week, day)){
list.push("Hårvask");
list.push(products[8]);
}

list.push(products[0]);
list.push(products[1]);

if(day==="Torsdag" && week==1){
list.push(products[6]);
}

list.push(products[2]);
list.push(products[3]);
list.push(products[4]);
}

render(list, key);
renderHistory();
renderProducts();
}

// RENDER CHECKLIST
function render(list, key){
let div = document.getElementById("routine");
div.innerHTML = "";

list.forEach(item => {

let done = tracker[key].includes(item);

div.innerHTML += `
<div class="item ${done?'done':''}" onclick="toggle('${item}')">
✔ ${item}
</div>
`;
});
}

// TOGGLE
function toggle(item){
let key = getKey();

if(!tracker[key]) tracker[key] = [];

if(tracker[key].includes(item)){
tracker[key] = tracker[key].filter(i => i !== item);
}else{
tracker[key].push(item);
}

localStorage.setItem("tracker", JSON.stringify(tracker));
generate();
}

// HISTORIKK
function renderHistory(){
let div = document.getElementById("history");
div.innerHTML = "";

if(Object.keys(tracker).length === 0){
div.innerHTML = "<i>Ingen historikk enda</i>";
return;
}

Object.keys(tracker).forEach(day => {
div.innerHTML += `
<div class="section">
<b>${day}</b><br>
${tracker[day].join("<br>")}
</div>`;
});
}

// TØM HISTORIKK
function clearHistory(){
let confirmDelete = confirm("Er du sikker på at du vil slette ALL historikk?");
if(confirmDelete){
tracker = {};
localStorage.removeItem("tracker");
renderHistory();
document.getElementById("routine").innerHTML = "";
}
}

// PRODUKTER
function renderProducts(){
let div = document.getElementById("productSection");

div.innerHTML = "<ul>";

products.forEach(p=>{
div.innerHTML += `<li>${p}</li>`;
});

div.innerHTML += "</ul>";
}

// INIT
renderProducts();
renderHistory();

</script>

</body>
</html>
