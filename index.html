<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Rutine App V10</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:12px; }
.section { margin-top:15px; padding:12px; background:#fafafa; border-radius:10px; }
.item { cursor:pointer; padding:6px; }
.done { text-decoration: line-through; color:gray; }
button { margin:5px; padding:8px; border:none; border-radius:8px; background:black; color:white; }
</style>

</head>

<body>

<div class="container">

<h1>🧠 Smart Rutine App</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<!-- HUD STATUS -->
<h3>Hudstatus</h3>
<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Vis smart rutine</button>

<div id="routine"></div>

</div>

<script>

// PRODUKTER
let p = {
cleanser:"Koreansk oljerens",
water:"Mild vannrens",
toner:"BOJ Ginseng",
vitc:"Medik8 C",
serum:"Laneige Serum",
night:"Byoma Serum",
cream:"Round Lab Cream",
scrub:"Tree Hut Scrub",
peel:"ExfoliKate",
body:"Sol de Janeiro Body Butter"
};

// HISTORIKK
let history = JSON.parse(localStorage.getItem("history")) || {};

// KEY
function key(){
return document.getElementById("week").value + "-" +
document.getElementById("day").value;
}

// BARBERING
function shave(day){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[day];
}

// CHECK YESTERDAY
function yesterdayUsedPeel(){
let keys = Object.keys(history);
let last = keys[keys.length-1];
if(!last) return false;
return history[last].includes("Peel");
}

// GENERATE
function generate(){

let day = document.getElementById("day").value;
let time = document.getElementById("time").value;
let skin = document.getElementById("skin").value;

let html = "";
let usedPeel = yesterdayUsedPeel();

html += `<div class="section"><h3>🧠 Smart logikk aktiv</h3>`;

// MORGEN
if(time==="Morgen"){

html += `• ${p.cleanser}<br>• ${p.toner}<br>`;

if(!usedPeel && skin !== "Sensitiv"){
html += `• ${p.vitc}<br>`;
}

html += `• ${p.serum}<br>• ${p.cream}`;
}

// KVELD
if(time==="Kveld"){

html += `<br><br>🚿 Dusj<br>• Dusj + kroppsvask`;

if(day==="Torsdag"){
html += `<br>• ${p.scrub}`;
}

// BARBERING
html += `<br><br>🪒 Barbering<br>• ${shave(day)}`;

// SKINCARE
html += `<br><br>🧼 Skincare<br>`;
html += `• ${p.cleanser}<br>• ${p.toner}<br>`;

// PEEL
if(day==="Torsdag"){
html += `• ${p.peel}<br>`;
history[key()] = ["Peel"];
}else{

// SMART LOGIKK
if(!usedPeel && skin !== "Sensitiv"){
html += `• ${p.night}<br>`;
}else{
html += `• (Recovery mode – ingen aktive)<br>`;
}

}

html += `• ${p.cream}`;
}

html += `</div>`;

document.getElementById("routine").innerHTML = html;

localStorage.setItem("history", JSON.stringify(history));
}

</script>

</body>
</html>
