<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Glow Routine</title>

<style>
body { font-family: Arial; background:#f9fafb; padding:20px; }
.container { max-width:400px; margin:auto; background:white; padding:20px; border-radius:20px; }
.item { padding:10px; margin:5px 0; background:#f3f4f6; border-radius:10px; cursor:pointer; }
.done { text-decoration:line-through; opacity:0.5; }
.card { margin-top:20px; padding:15px; background:#f9fafb; border-radius:15px; }
input, select, button { margin:5px; padding:8px; border-radius:10px; }
.product-row { display:flex; justify-content:space-between; }
</style>

</head>

<body>

<div class="container">

<h2>✨ Glow Routine</h2>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Vis rutine</button>

<div id="routine"></div>

<div class="card">
<h3>📊 Historikk</h3>
<button onclick="clearHistory()">Tøm</button>
<div id="history"></div>
</div>

<div class="card">
<h3>🧴 Produkter</h3>

<input id="name" placeholder="Produktnavn">
<select id="type">
<option value="cleanser">Rens</option>
<option value="serum">Serum</option>
<option value="cream">Krem</option>
<option value="active">Aktiv</option>
</select>

<button onclick="addProduct()">Legg til</button>

<div id="products"></div>

</div>

</div>

<script>

// PRODUKTER (med type)
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Koreansk oljerens", type:"cleanser"},
{name:"Byoma Serum", type:"serum"},
{name:"Round Lab Cream", type:"cream"},
{name:"Vitamin C", type:"active"}
];

// TRACKER
let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// KEY
function getKey(){
return week.value + "-" + day.value + "-" + time.value;
}

// GENERATE
function generate(){

let key = getKey();
if(!tracker[key]) tracker[key] = [];

let skin = document.getElementById("skin").value;

let list = [];

// HENT PRODUKTER PER TYPE
let cleanser = products.filter(p=>p.type==="cleanser").map(p=>p.name);
let serum = products.filter(p=>p.type==="serum").map(p=>p.name);
let cream = products.filter(p=>p.type==="cream").map(p=>p.name);
let active = products.filter(p=>p.type==="active").map(p=>p.name);

// LOGIKK
list.push(...cleanser);

if(skin !== "Sensitiv"){
list.push(...active);
}

list.push(...serum);
list.push(...cream);

renderRoutine(list, key);
renderHistory();
}

// RENDER
function renderRoutine(list, key){

let div = document.getElementById("routine");
div.innerHTML = "";

list.forEach(item => {

let done = tracker[key].includes(item);

let el = document.createElement("div");
el.className = "item " + (done ? "done" : "");
el.innerText = item;

el.onclick = () => toggle(item);

div.appendChild(el);
});
}

// TOGGLE
function toggle(item){

let key = getKey();

if(tracker[key].includes(item)){
tracker[key] = tracker[key].filter(i => i !== item);
}else{
tracker[key].push(item);
}

localStorage.setItem("tracker", JSON.stringify(tracker));
generate();
}

// HISTORY
function renderHistory(){

let div = document.getElementById("history");
div.innerHTML = "";

Object.keys(tracker).forEach(k => {

let el = document.createElement("div");
el.innerText = k + ": " + tracker[k].join(", ");
div.appendChild(el);

});
}

// CLEAR
function clearHistory(){
tracker = {};
localStorage.removeItem("tracker");
renderHistory();
}

// ADD
function addProduct(){

let name = document.getElementById("name").value;
let type = document.getElementById("type").value;

products.push({name, type});
localStorage.setItem("products", JSON.stringify(products));

renderProducts();
}

// REMOVE
function removeProduct(index){
products.splice(index,1);
localStorage.setItem("products", JSON.stringify(products));
renderProducts();
}

// RENDER PRODUCTS
function renderProducts(){

let div = document.getElementById("products");
div.innerHTML = "";

products.forEach((p,i)=>{

let row = document.createElement("div");
row.className = "product-row";

row.innerHTML = `
<span>${p.name} (${p.type})</span>
<button onclick="removeProduct(${i})">❌</button>
`;

div.appendChild(row);

});
}

// INIT
renderProducts();
renderHistory();

</script>

</body>
</html>
