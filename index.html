<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Glow Routine</title>

<style>
body {
font-family: -apple-system, Arial;
background:#f6f6f6;
padding:20px;
}

.container {
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
}

.controls {
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px;
}

select, button, input {
padding:10px;
border-radius:12px;
border:1px solid #ccc;
}

button {
background:black;
color:white;
}

.item {
padding:12px;
margin:6px 0;
background:#f1f1f1;
border-radius:12px;
cursor:pointer;
}

.done {
opacity:0.4;
text-decoration:line-through;
}

.card {
margin-top:20px;
padding:15px;
background:#fafafa;
border-radius:15px;
}

.product-row {
display:flex;
justify-content:space-between;
margin:6px 0;
}
</style>

</head>

<body>

<div class="container">

<h2>✨ Glow Routine</h2>

<div class="controls">

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Vis rutine</button>

</div>

<div id="routine"></div>

<div class="card">
<h3>🧴 Produkter</h3>

<input id="name" placeholder="Skriv produkt...">
<button onclick="addProduct()">Legg til</button>
<button onclick="resetProducts()">Reset</button>

<div id="products"></div>
</div>

<div class="card">
<h3>📊 Historikk</h3>
<button onclick="clearHistory()">Tøm</button>
<div id="history"></div>
</div>

</div>

<script>

// ===== SMART ANALYSE (ÉN FUNKSJON) =====
function analyze(name){

let n = name.toLowerCase();

// BODY
if(n.includes("body") || n.includes("bum bum") || n.includes("butter")){
return {type:"cream", category:"body"};
}

// CLEANSER
if(n.includes("rens") || n.includes("cleanser")){
return {type:"cleanser", category:"cleanser"};
}

// TONER
if(n.includes("toner") || n.includes("essence")){
return {type:"toner", category:"toner"};
}

// SERUM
if(n.includes("serum")){
return {type:"serum", category:"serum"};
}

// ACTIVE
if(n.includes("acid") || n.includes("vitamin") || n.includes("retinol")){
return {type:"active", category:"active"};
}

// FACE CREAM
if(n.includes("cream") || n.includes("krem")){
return {type:"cream", category:"faceCream"};
}

// OIL
if(n.includes("oil")){
return {type:"oil", category:"oil"};
}

// fallback
return {type:"serum", category:"serum"};
}

// ===== DEFAULT PRODUKTER =====
const defaultProducts = [
{name:"Koreansk oljerens", category:"cleanser"},
{name:"Mild vannrens", category:"cleanser"},
{name:"BOJ Ginseng Essence", category:"toner"},
{name:"Byoma Serum", category:"serum"},
{name:"Round Lab Cream", category:"faceCream"},
{name:"Delicia Body Butter", category:"body"},
{name:"Vitamin C", category:"active"},
{name:"ExfoliKate", category:"active"},
{name:"Kerastase Oil", category:"oil"}
];

// ===== LOAD =====
let saved = JSON.parse(localStorage.getItem("products"));
let products = (saved && saved.length) ? saved : defaultProducts;

let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// ===== KEY =====
function getKey(){
return week.value + "-" + day.value + "-" + time.value;
}

// ===== BARBERING =====
function shave(d){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[d];
}

// ===== HÅR =====
function hair(w,d){
return (w==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(d)) ||
(w==2 && ["Tirsdag","Torsdag","Lørdag"].includes(d));
}

// ===== GENERATE =====
function generate(){

let key = getKey();
if(!tracker[key]) tracker[key]=[];

let skinType = skin.value;

let list = [];

// MORGEN
if(time.value==="Morgen"){

list.push(...products.filter(p=>p.category==="cleanser").map(p=>p.name));
list.push(...products.filter(p=>p.category==="toner").map(p=>p.name));

if(skinType!=="Sensitiv"){
list.push(...products.filter(p=>p.category==="active").map(p=>p.name));
}

list.push(...products.filter(p=>p.category==="serum").map(p=>p.name));
list.push(...products.filter(p=>p.category==="faceCream").map(p=>p.name));
}

// KVELD
if(time.value==="Kveld"){

list.push("🚿 Dusj");
list.push("🪒 " + shave(day.value));

// BODY
list.push(...products.filter(p=>p.category==="body").map(p=>p.name));

if(hair(week.value, day.value)){
list.push("💇‍♀️ Hårvask + Kerastase Oil");
}

list.push(...products.filter(p=>p.category==="cleanser").map(p=>p.name));

if(skinType!=="Sensitiv"){
list.push(...products.filter(p=>p.category==="active").map(p=>p.name));
}

list.push(...products.filter(p=>p.category==="serum").map(p=>p.name));
list.push(...products.filter(p=>p.category==="faceCream").map(p=>p.name));
}

render(list,key);
renderHistory();
}

// ===== RENDER =====
function render(list,key){

routine.innerHTML="";

list.forEach(item=>{
let done = tracker[key].includes(item);

let el=document.createElement("div");
el.className="item "+(done?"done":"");
el.innerText=item;

el.onclick=()=>{
if(done){
tracker[key]=tracker[key].filter(i=>i!==item);
}else{
tracker[key].push(item);
}

localStorage.setItem("tracker",JSON.stringify(tracker));
generate();
};

routine.appendChild(el);
});
}

// ===== ADD PRODUCT (SMART REPLACE) =====
function addProduct(){

let input=document.getElementById("name");
let name=input.value.trim();
if(!name) return;

let result = analyze(name);

// fjern samme kategori (unntatt active)
products = products.filter(p=>{
if(result.category==="active") return true;
return p.category !== result.category;
});

// legg til
products.push({
name:name,
category:result.category
});

localStorage.setItem("products",JSON.stringify(products));

input.value="";

renderProducts();
generate();
}

// ===== REMOVE =====
function removeProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
generate();
}

// ===== RESET =====
function resetProducts(){
localStorage.removeItem("products");
location.reload();
}

// ===== PRODUCTS =====
function renderProducts(){

productsDiv.innerHTML="";

products.forEach((p,i)=>{
let row=document.createElement("div");
row.className="product-row";

row.innerHTML=`
<span>${p.name}</span>
<button onclick="removeProduct(${i})">❌</button>
`;

productsDiv.appendChild(row);
});
}

// ===== HISTORY =====
function renderHistory(){

history.innerHTML="";

Object.keys(tracker).forEach(k=>{
let el=document.createElement("div");
el.innerText=k+": "+tracker[k].join(", ");
history.appendChild(el);
});
}

// ===== CLEAR =====
function clearHistory(){
tracker={};
localStorage.removeItem("tracker");
renderHistory();
}

// ===== INIT =====
renderProducts();
renderHistory();

</script>

</body>
</html>
