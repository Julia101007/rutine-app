<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Smart Rutine App</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:16px; }
.section { margin-top:15px; padding:12px; background:#fafafa; border-radius:12px; }
.item { padding:8px; cursor:pointer; }
.done { text-decoration: line-through; color:gray; }
button { padding:10px; margin:5px; border:none; border-radius:10px; }
.black { background:black; color:white; }
.red { background:#e74c3c; color:white; }
</style>

</head>

<body>

<div class="container">

<h1>🧠 Smart Rutine App</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<h3>Hudstatus</h3>
<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<br>
<button class="black" onclick="generate()">Vis rutine</button>

<div id="routine"></div>

<h2>📊 Historikk</h2>
<button class="red" onclick="clearHistory()">🧹 Tøm historikk</button>
<div id="history"></div>

<h2>📦 Alle produkter</h2>
<ul id="productList"></ul>

</div>

<script>

// PRODUKTER
let products = [
"Koreansk oljerens",
"Mild vannrens",
"BOJ Ginseng",
"Byoma Serum",
"Round Lab Cream",
"Tree Hut Scrub",
"ExfoliKate",
"Sol de Janeiro Body Butter",
"Kérastase Oil",
"Medik8 Vitamin C"
];

// STORAGE
let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// KEY
function getKey(){
return document.getElementById("week").value + "-" +
document.getElementById("day").value + "-" +
document.getElementById("time").value;
}

// BARBERING
function shave(day){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[day];
}

// HÅR
function hair(week, day){
if(week==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(day)) return true;
if(week==2 && ["Tirsdag","Torsdag","Lørdag"].includes(day)) return true;
return false;
}

// SJEKK PEEL I GÅR
function usedPeelYesterday(){
let keys = Object.keys(tracker);
if(keys.length === 0) return false;
let last = keys[keys.length - 1];
return tracker[last].includes("ExfoliKate");
}

// GENERATE
function generate(){

let week = document.getElementById("week").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;
let skin = document.getElementById("skin").value;

let key = getKey();
if(!tracker[key]) tracker[key] = [];

let usedPeel = usedPeelYesterday();
let list = [];

// MORGEN
if(time === "Morgen"){
list = [
products[0],
products[1],
products[2],
(!usedPeel && skin !== "Sensitiv") ? products[9] : null,
products[3],
products[4]
].filter(Boolean);
}

// KVELD
if(time === "Kveld"){

list.push("Dusj + kroppsvask");

if(day === "Torsdag"){
list.push(products[5]);
list.push("Body oil");
} else {
list.push(products[7]);
}

list.push("Barbering: " + shave(day));

if(hair(week, day)){
list.push("Hårvask");
list.push(products[8]);
}

list.push(products[0], products[1]);

if(day === "Torsdag"){
list.push(products[6]);
} else {
if(!usedPeel && skin !== "Sensitiv"){
list.push(products[3]);
} else {
list.push("Recovery (ingen aktive)");
}
}

list.push(products[2], products[4]);
}

renderRoutine(list, key);
renderHistory();
renderProducts();
}

// RENDER ROUTINE
function renderRoutine(list, key){
let div = document.getElementById("routine");
div.innerHTML = "";

list.forEach(item => {

let done = tracker[key].includes(item);

let el = document.createElement("div");
el.className = "item " + (done ? "done" : "");
el.innerText = "✔ " + item;

el.onclick = () => toggle(item);

div.appendChild(el);

});
}

// TOGGLE
function toggle(item){
let key = getKey();

if(!tracker[key]) tracker[key] = [];

if(tracker[key].includes(item)){
tracker[key] = tracker[key].filter(i => i !== item);
} else {
tracker[key].push(item);
}

localStorage.setItem("tracker", JSON.stringify(tracker));
generate();
}

// HISTORIKK
function renderHistory(){
let div = document.getElementById("history");
div.innerHTML = "";

if(Object.keys(tracker).length === 0){
div.innerHTML = "Ingen historikk enda";
return;
}

for(let key in tracker){
let block = document.createElement("div");
block.className = "section";

block.innerHTML = "<b>" + key + "</b><br>" + tracker[key].join("<br>");
div.appendChild(block);
}
}

// TØM
function clearHistory(){
if(confirm("Slette all historikk?")){
tracker = {};
localStorage.removeItem("tracker");
renderHistory();
document.getElementById("routine").innerHTML = "";
}
}

// PRODUKTER
function renderProducts(){
let ul = document.getElementById("productList");
ul.innerHTML = "";

products.forEach(p => {
let li = document.createElement("li");
li.innerText = p;
ul.appendChild(li);
});
}

// INIT
renderProducts();
renderHistory();

</script>

</body>
</html>
