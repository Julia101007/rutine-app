<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Rutine App</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:12px; }
.section { margin-top:15px; padding:12px; background:#fafafa; border-radius:10px; }
button { margin:5px; padding:8px; border:none; border-radius:8px; background:black; color:white; }
input { padding:8px; margin:5px; }
</style>

</head>

<body>

<div class="container">

<h1>✨ Rutine App</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<button onclick="generate()">Vis rutine</button>
<button onclick="travel()">✈️ Ferieliste</button>

<div id="routine"></div>

<h2>📦 Alle produkter</h2>
<ul id="productList"></ul>

<input id="newProduct" placeholder="Legg til produkt">
<button onclick="addProduct()">+</button>

</div>

<script>

// PRODUKTLISTE
let products = JSON.parse(localStorage.getItem("products")) || [
"Koreansk oljerens",
"Mild vannrens",
"BOJ Ginseng Essence",
"d’Alba Mist",
"Medik8 Vitamin C",
"Laneige Serum",
"Byoma Serum",
"Round Lab Cream",
"Paula’s Choice Cream",
"Kérastase Hair Oil",
"Gisou Hair Oil",
"Sam McKnight Oil",
"Tree Hut Scrub",
"ExfoliKate",
"Sol de Janeiro Body Butter"
];

// BARBERING
function shave(day){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[day];
}

// HÅRVASK
function hair(week, day){
if(week==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(day)) return true;
if(week==2 && ["Tirsdag","Torsdag","Lørdag"].includes(day)) return true;
return false;
}

// GENERATE
function generate(){

let week = document.getElementById("week").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

let html = "";

// MORGEN
if(time==="Morgen"){
html += `
<div class="section">
<h3>🌞 Morgen</h3>
• ${products[0]}<br>
• ${products[1]}<br>
• ${products[2]}<br>
• ${products[3]}<br>
• ${products[4]}<br>
• ${products[5]}<br>
• ${products[8]}
</div>
`;
}

// KVELD
if(time==="Kveld"){

html += `
<div class="section">
<h3>🚿 Dusj</h3>
• Dusj + kroppsvask<br>
${day==="Torsdag" ? "• "+products[12]+"<br>• Body oil" : "• "+products[14]}
</div>
`;

html += `
<div class="section">
<h3>🪒 Barbering</h3>
• ${shave(day)}
</div>
`;

if(hair(week, day)){
html += `
<div class="section">
<h3>💇‍♀️ Hår</h3>
• Hårvask<br>
• ${products[9]}
</div>
`;
}

html += `
<div class="section">
<h3>🧼 Skincare</h3>
• ${products[0]}<br>
• ${products[1]}<br>
${(day==="Torsdag" && week==1) ? "• "+products[13]+"<br>" : ""}
• ${products[2]}<br>
• ${products[6]}<br>
• ${products[7]}
</div>
`;
}

document.getElementById("routine").innerHTML = html;
}

// PRODUKTER UI
function renderProducts(){
let list = document.getElementById("productList");
list.innerHTML = "";

products.forEach((p, i)=>{
list.innerHTML += `
<li>${p} <button onclick="remove(${i})">X</button></li>
`;
});
}

// ADD
function addProduct(){
let val = document.getElementById("newProduct").value;
if(val){
products.push(val);
localStorage.setItem("products", JSON.stringify(products));
renderProducts();
}
}

// REMOVE
function remove(i){
products.splice(i,1);
localStorage.setItem("products", JSON.stringify(products));
renderProducts();
}

// TRAVEL
function travel(){
document.getElementById("routine").innerHTML = `
<div class="section">
<h3>✈️ Ferieliste</h3>
• ${products[0]}<br>
• ${products[2]}<br>
• ${products[4]}<br>
• ${products[5]}<br>
• ${products[7]}
</div>
`;
}

renderProducts();

</script>

</body>
</html>
