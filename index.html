<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Smart Beauty App</title>

<style>
body { font-family: Arial; background:#f9fafb; padding:20px; }
.container { max-width:400px; margin:auto; background:white; padding:20px; border-radius:20px; }
.item { padding:10px; margin:5px 0; background:#f3f4f6; border-radius:10px; cursor:pointer; }
.done { text-decoration:line-through; opacity:0.5; }
.card { margin-top:20px; padding:15px; background:#f9fafb; border-radius:15px; }
.product-row { display:flex; justify-content:space-between; margin:5px 0; }
input, button { padding:8px; margin:5px; border-radius:10px; }
</style>

</head>

<body>

<div class="container">

<h2>✨ Smart Beauty Routine</h2>

<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Vis rutine</button>

<div id="routine"></div>

<div class="card">
<h3>🧴 Produkter</h3>
<input id="name" placeholder="Skriv produkt...">
<button onclick="addProduct()">Legg til</button>
<div id="products"></div>
</div>

<div class="card">
<h3>📊 Historikk</h3>
<button onclick="clearHistory()">Tøm</button>
<div id="history"></div>
</div>

</div>

<script>

// SMART TYPE DETECTION
function detectType(name){
name = name.toLowerCase();

if(name.includes("cleanser") || name.includes("wash") || name.includes("foam")) return "cleanser";
if(name.includes("toner") || name.includes("essence")) return "toner";
if(name.includes("serum") || name.includes("ampoule")) return "serum";
if(name.includes("cream") || name.includes("moistur")) return "cream";
if(name.includes("oil")) return "oil";
if(name.includes("acid") || name.includes("peel")) return "active";

return "serum"; // default
}

// STORAGE
let products = JSON.parse(localStorage.getItem("products")) || [];
let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// KEY
function key(){
return "today";
}

// GENERATE
function generate(){

let k = key();
if(!tracker[k]) tracker[k] = [];

let skin = document.getElementById("skin").value;

// SORT PRODUCTS
let cleanser = products.filter(p=>p.type==="cleanser");
let toner = products.filter(p=>p.type==="toner");
let serum = products.filter(p=>p.type==="serum");
let cream = products.filter(p=>p.type==="cream");
let active = products.filter(p=>p.type==="active");

let list = [];

// ROUTINE
list.push(...cleanser.map(p=>p.name));
list.push(...toner.map(p=>p.name));

if(skin !== "Sensitiv"){
list.push(...active.map(p=>p.name));
}

list.push(...serum.map(p=>p.name));
list.push(...cream.map(p=>p.name));

render(list, k);
renderHistory();
}

// RENDER
function render(list, k){

let div = document.getElementById("routine");
div.innerHTML = "";

list.forEach(item => {

let done = tracker[k].includes(item);

let el = document.createElement("div");
el.className = "item " + (done ? "done" : "");
el.innerText = item;

el.onclick = () => toggle(item);

div.appendChild(el);
});
}

// TOGGLE
function toggle(item){

let k = key();

if(tracker[k].includes(item)){
tracker[k] = tracker[k].filter(i=>i!==item);
}else{
tracker[k].push(item);
}

localStorage.setItem("tracker", JSON.stringify(tracker));
generate();
}

// ADD PRODUCT (SMART)
function addProduct(){

let name = document.getElementById("name").value;

let type = detectType(name);

products.push({name, type});

localStorage.setItem("products", JSON.stringify(products));

renderProducts();
}

// REMOVE
function removeProduct(i){
products.splice(i,1);
localStorage.setItem("products", JSON.stringify(products));
renderProducts();
}

// RENDER PRODUCTS
function renderProducts(){

let div = document.getElementById("products");
div.innerHTML = "";

products.forEach((p,i)=>{
let row = document.createElement("div");
row.className = "product-row";

row.innerHTML = `
<span>${p.name} (${p.type})</span>
<button onclick="removeProduct(${i})">❌</button>
`;

div.appendChild(row);
});
}

// HISTORY
function renderHistory(){

let div = document.getElementById("history");
div.innerHTML = "";

Object.keys(tracker).forEach(k=>{
let el = document.createElement("div");
el.innerText = tracker[k].join(", ");
div.appendChild(el);
});
}

// CLEAR
function clearHistory(){
tracker = {};
localStorage.removeItem("tracker");
renderHistory();
}

// INIT
renderProducts();
renderHistory();

</script>

</body>
</html>
