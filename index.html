<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Rutine App</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:800px; margin:auto; background:white; padding:20px; border-radius:12px; }
.section { margin-top:15px; padding:12px; background:#fafafa; border-radius:10px; }
h3 { margin-bottom:5px; }
</style>

</head>

<body>

<div class="container">

<h1>✨ Rutine App</h1>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<button onclick="generate()">Vis rutine</button>

<div id="routine"></div>

</div>

<script>

// PRODUKTER
let p = {
cleanser:"Koreansk oljerens",
water:"Mild vannrens",
toner:"BOJ Ginseng",
mist:"d’Alba",
vitc:"Medik8 C",
serum:"Laneige Serum",
night:"Byoma Serum",
cream:"Round Lab Cream",
daycream:"Paula’s Choice",
hairoil:"Kerastase Oil",
body:"Delicia Body Butter",
scrub:"Tree Hut Scrub",
peel:"ExfoliKate"
};

// BARBERING (TYDELIG!)
function shave(day){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikinilinje + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikinilinje + intim",
"Søndag":"Armhuler + legger"
}[day];
}

// HÅRVASK
function hair(week, day){
if(week==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(day)) return true;
if(week==2 && ["Tirsdag","Torsdag","Lørdag"].includes(day)) return true;
return false;
}

// GENERATE
function generate(){

let week = document.getElementById("week").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

let html = "";

// MORGEN
if(time==="Morgen"){
html += `
<div class="section">
<h3>🌞 Morgen</h3>
• ${p.cleanser}<br>
• ${p.water}<br>
• ${p.toner}<br>
• ${p.mist}<br>
• ${p.vitc}<br>
• ${p.serum}<br>
• ${p.daycream}
</div>
`;
}

// KVELD
if(time==="Kveld"){

// DUSJ
html += `
<div class="section">
<h3>🚿 Dusj</h3>
• Dusj + kroppsvask<br>
${day==="Torsdag" ? "• Skrubb → "+p.scrub+"<br>• Body oil" : "• Body cream → "+p.body}
</div>
`;

// BARBERING (EGEN BOKS)
html += `
<div class="section">
<h3>🪒 Barbering</h3>
• ${shave(day)}
</div>
`;

// HÅR
if(hair(week, day)){
html += `
<div class="section">
<h3>💇‍♀️ Hår</h3>
• Hårvask<br>
• ${p.hairoil}
</div>
`;
}

// SKINCARE
html += `
<div class="section">
<h3>🧼 Skincare</h3>
• ${p.cleanser}<br>
• ${p.water}<br>
${(day==="Torsdag" && week==1) ? "• "+p.peel+"<br>" : ""}
• ${p.toner}<br>
• ${p.night}<br>
• ${p.cream}
</div>
`;
}

document.getElementById("routine").innerHTML = html;
}

</script>

</body>
</html>
