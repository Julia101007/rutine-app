<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>AI Glow Routine</title>

<style>
body { font-family: Arial; background:#f6f6f6; padding:20px; }
.container { max-width:420px; margin:auto; background:white; padding:20px; border-radius:20px; }

.item { padding:10px; margin:5px 0; background:#eee; border-radius:10px; cursor:pointer; }
.done { opacity:0.4; text-decoration:line-through; }

.card { margin-top:20px; padding:15px; background:#fafafa; border-radius:15px; }

.product-row { display:flex; justify-content:space-between; }

button, input, select { padding:10px; margin:5px; border-radius:10px; }
</style>
</head>

<body>

<div class="container">

<h2>✨ AI Glow Routine</h2>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Vis rutine</button>

<div id="routine"></div>

<div class="card">
<h3>🧴 Produkter</h3>

<input id="name" placeholder="Skriv produkt...">
<button onclick="addProduct()">Legg til</button>

<div id="products"></div>
</div>

</div>

<script>

let products = [];
let tracker = {};

async function addProduct(){

let input = document.getElementById("name");
let name = input.value.trim();
if(!name) return;

// 🔥 KALL AI SERVER
let res = await fetch("http://localhost:3000/analyze", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({name})
});

let result = await res.json();

// 🔥 ERSTATT SAMME KATEGORI
products = products.filter(p=>{
if(result.category === "active") return true;
return p.category !== result.category;
});

// legg til
products.push({
name,
type: result.type,
category: result.category
});

input.value = "";

renderProducts();
generate();
}

function generate(){

let skin = document.getElementById("skin").value;
let time = document.getElementById("time").value;

let list = [];

// MORGEN
if(time === "Morgen"){

list.push(...products.filter(p=>p.category==="cleanser").map(p=>p.name));
list.push(...products.filter(p=>p.category==="toner").map(p=>p.name));

if(skin !== "Sensitiv"){
list.push(...products.filter(p=>p.category==="active").map(p=>p.name));
}

list.push(...products.filter(p=>p.category==="serum").map(p=>p.name));
list.push(...products.filter(p=>p.category==="faceCream").map(p=>p.name));
}

// KVELD
if(time === "Kveld"){

list.push("🚿 Dusj");

list.push(...products.filter(p=>p.category==="body").map(p=>p.name));

list.push(...products.filter(p=>p.category==="cleanser").map(p=>p.name));

if(skin !== "Sensitiv"){
list.push(...products.filter(p=>p.category==="active").map(p=>p.name));
}

list.push(...products.filter(p=>p.category==="serum").map(p=>p.name));
list.push(...products.filter(p=>p.category==="faceCream").map(p=>p.name));
}

render(list);
}

function render(list){

let div = document.getElementById("routine");
div.innerHTML = "";

list.forEach(item=>{
let el = document.createElement("div");
el.className="item";
el.innerText=item;
div.appendChild(el);
});
}

function renderProducts(){

let div = document.getElementById("products");
div.innerHTML="";

products.forEach((p,i)=>{
let row=document.createElement("div");
row.className="product-row";

row.innerHTML=`
<span>${p.name}</span>
<button onclick="removeProduct(${i})">❌</button>
`;

div.appendChild(row);
});
}

function removeProduct(i){
products.splice(i,1);
renderProducts();
generate();
}

</script>

</body>
</html>
