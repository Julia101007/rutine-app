<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Glow Routine</title>

<style>

body{
margin:0;
font-family:-apple-system;
background: linear-gradient(180deg,#fdf2f8,#eef2ff);
padding:20px;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
}

/* HEADER */
.header{
font-size:28px;
font-weight:700;
margin-bottom:15px;
}

/* CONTROLS */
.controls{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:15px;
}

select, button{
padding:10px;
border-radius:12px;
border:none;
background:white;
}

/* CARD */
.card{
background:white;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

/* SECTION TITLE */
.title{
font-weight:600;
margin-bottom:10px;
}

/* ITEM */
.item{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
margin:6px 0;
border-radius:12px;
background:#f9fafb;
cursor:pointer;
}

.check{
width:20px;
height:20px;
border-radius:6px;
background:#e5e7eb;
}

.done .check{
background:#10b981;
}

.done{
opacity:0.5;
text-decoration:line-through;
}

/* HISTORY */
.history-card{
background:white;
padding:12px;
border-radius:16px;
margin-top:10px;
}

/* PRODUCT */
.product{
background:white;
padding:10px;
border-radius:12px;
margin-top:5px;
}

/* BUTTON */
.red{
background:#ff4d6d;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="header">✨ Glow Routine</div>

<div class="controls">
<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<select id="skin">
<option>Normal</option>
<option>Sensitiv</option>
<option>Tørr</option>
<option>Akne</option>
</select>

<button onclick="generate()">Start</button>
</div>

<div id="routine"></div>

<div class="card">
<div class="title">📊 Historikk</div>
<button class="red" onclick="clearHistory()">Tøm</button>
<div id="history"></div>
</div>

<div class="card">
<div class="title">🧴 Produkter</div>
<div id="products"></div>
</div>

</div>

<script>

let products=[
"Koreansk oljerens",
"Mild vannrens",
"BOJ Ginseng",
"Byoma Serum",
"Round Lab Cream",
"Tree Hut Scrub",
"ExfoliKate",
"Sol de Janeiro Body Butter",
"Kérastase Oil",
"Vitamin C"
];

let tracker=JSON.parse(localStorage.getItem("tracker"))||{};

function key(){
return week.value+"-"+day.value+"-"+time.value;
}

function shave(d){
return {
"Mandag":"Armhuler + legger",
"Tirsdag":"Lår + armer",
"Onsdag":"Bikini + intim",
"Torsdag":"Lår + armer",
"Fredag":"Armhuler + legger",
"Lørdag":"Bikini + intim",
"Søndag":"Armhuler + legger"
}[d];
}

function hair(w,d){
return (w==1 && ["Mandag","Onsdag","Fredag","Søndag"].includes(d)) ||
(w==2 && ["Tirsdag","Torsdag","Lørdag"].includes(d));
}

function peelYesterday(){
let k=Object.keys(tracker);
if(k.length===0)return false;
return tracker[k[k.length-1]].includes("ExfoliKate");
}

function generate(){

let k=key();
if(!tracker[k])tracker[k]=[];

let list=[];
let peel=peelYesterday();

// MORGEN
if(time.value==="Morgen"){
list=[products[0],products[1],products[2],
(!peel?products[9]:null),
products[3],products[4]].filter(Boolean);
}

// KVELD
if(time.value==="Kveld"){

list.push("Dusj");

if(day.value==="Torsdag"){
list.push(products[5]);
}else{
list.push(products[7]);
}

list.push("Barbering: "+shave(day.value));

if(hair(week.value,day.value)){
list.push("Hårvask");
list.push(products[8]);
}

list.push(products[0],products[1]);

if(day.value==="Torsdag"){
list.push(products[6]);
}else{
list.push(!peel?products[3]:"Recovery");
}

list.push(products[2],products[4]);
}

render(list,k);
renderHistory();
renderProducts();
}

function render(list,k){

routine.innerHTML=`<div class="card"></div>`;
let card=routine.firstChild;

list.forEach(item=>{
let done=tracker[k].includes(item);

let el=document.createElement("div");
el.className="item "+(done?"done":"");

el.innerHTML=`
<span>${item}</span>
<div class="check"></div>
`;

el.onclick=()=>{
if(done){
tracker[k]=tracker[k].filter(i=>i!==item);
}else{
tracker[k].push(item);
}
localStorage.setItem("tracker",JSON.stringify(tracker));
generate();
};

card.appendChild(el);
});
}

function renderHistory(){
history.innerHTML="";
for(let k in tracker){
let el=document.createElement("div");
el.className="history-card";
el.innerHTML="<b>"+k+"</b><br>"+tracker[k].join("<br>");
history.appendChild(el);
}
}

function clearHistory(){
tracker={};
localStorage.removeItem("tracker");
renderHistory();
}

function renderProducts(){
productsDiv.innerHTML="";
products.forEach(p=>{
let el=document.createElement("div");
el.className="product";
el.innerText=p;
productsDiv.appendChild(el);
});
}

renderProducts();
renderHistory();

</script>

</body>
</html>
