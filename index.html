<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Glow Routine</title>

<style>
body {
font-family: Arial;
background: #f9fafb;
padding:20px;
}

.container {
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
}

.item {
padding:10px;
margin:5px 0;
background:#f3f4f6;
border-radius:10px;
cursor:pointer;
}

.done {
text-decoration:line-through;
opacity:0.5;
}

.card {
margin-top:20px;
padding:15px;
background:#f9fafb;
border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>✨ Glow Routine</h2>

<select id="week">
<option value="1">Uke 1</option>
<option value="2">Uke 2</option>
</select>

<select id="day">
<option>Mandag</option>
<option>Tirsdag</option>
<option>Onsdag</option>
<option>Torsdag</option>
<option>Fredag</option>
<option>Lørdag</option>
<option>Søndag</option>
</select>

<select id="time">
<option>Morgen</option>
<option>Kveld</option>
</select>

<button onclick="generate()">Vis rutine</button>

<div id="routine"></div>

<div class="card">
<h3>📊 Historikk</h3>
<button onclick="clearHistory()">Tøm</button>
<div id="history"></div>
</div>

<div class="card">
<h3>🧴 Produkter</h3>
<div id="products"></div>
</div>

</div>

<script>

// DATA
const products = [
"Koreansk oljerens",
"Mild vannrens",
"BOJ Ginseng",
"Byoma Serum",
"Round Lab Cream"
];

// STORAGE
let tracker = JSON.parse(localStorage.getItem("tracker")) || {};

// KEY
function getKey(){
return document.getElementById("week").value + "-" +
document.getElementById("day").value + "-" +
document.getElementById("time").value;
}

// GENERATE
function generate(){

let key = getKey();
if(!tracker[key]) tracker[key] = [];

let list = [];

if(document.getElementById("time").value === "Morgen"){
list = [...products];
} else {
list = ["Dusj", "Barbering", ...products];
}

renderRoutine(list, key);
renderHistory();
}

// RENDER ROUTINE
function renderRoutine(list, key){

const div = document.getElementById("routine");
div.innerHTML = "";

list.forEach(item => {

const el = document.createElement("div");

let done = tracker[key].includes(item);

el.className = "item " + (done ? "done" : "");
el.innerText = item;

el.onclick = () => toggle(item);

div.appendChild(el);

});
}

// TOGGLE
function toggle(item){

let key = getKey();

if(tracker[key].includes(item)){
tracker[key] = tracker[key].filter(i => i !== item);
} else {
tracker[key].push(item);
}

localStorage.setItem("tracker", JSON.stringify(tracker));

generate();
}

// HISTORY (GARANTERT FUNKER)
function renderHistory(){

const div = document.getElementById("history");
div.innerHTML = "";

const keys = Object.keys(tracker);

if(keys.length === 0){
div.innerText = "Ingen historikk";
return;
}

keys.forEach(k => {

const el = document.createElement("div");

el.innerText = k + " → " + tracker[k].join(", ");

div.appendChild(el);

});
}

// CLEAR
function clearHistory(){
tracker = {};
localStorage.removeItem("tracker");
renderHistory();
}

// PRODUCTS (GARANTERT FUNKER)
function renderProducts(){

const div = document.getElementById("products");
div.innerHTML = "";

products.forEach(p => {

const el = document.createElement("div");
el.innerText = p;

div.appendChild(el);

});
}

// INIT
renderProducts();
renderHistory();

</script>

</body>
</html>
